name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev libwayland-dev wayland-protocols \
            pkg-config meson gcc g++ git \
            libgirepository1.0-dev
          # Build gtk4-layer-shell from source (not packaged in all Ubuntu versions)
          git clone --depth 1 https://github.com/wmww/gtk4-layer-shell.git /tmp/gtk4-layer-shell
          meson setup /tmp/gtk4-layer-shell/build /tmp/gtk4-layer-shell \
            --prefix=/usr/local -Dintrospection=false -Dvapi=false
          ninja -C /tmp/gtk4-layer-shell/build
          sudo ninja -C /tmp/gtk4-layer-shell/build install
          sudo ldconfig

      - name: Vet
        run: go vet $(go list ./... | grep -v layershell)

      - name: Build
        run: go build -o snry-shell ./cmd/snry-shell

      - name: Test
        run: go test -race ./...

  goreleaser-check:
    name: GoReleaser Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Check GoReleaser config
        uses: goreleaser/goreleaser-action@v6
        with:
          args: check

# ──────────────────────────────────────────────────────────────────────────────
# Example Hyprland config for snry-shell
# Adapted from end-4/dots-hyprland (https://github.com/end-4/dots-hyprland)
# ──────────────────────────────────────────────────────────────────────────────
# snry-shell replaces: bar, OSK, lock screen, idle daemon, notification daemon,
# overview, session menu, control panel, and media overlay.
# You do NOT need: waybar, hypridle, hyprlock, mako/dunst, ags, quickshell.
# ──────────────────────────────────────────────────────────────────────────────


# ── Environment ───────────────────────────────────────────────────────────────

env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,24

# Toolkit scaling (adjust if you use a HiDPI display)
env = GDK_SCALE,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# XWayland
env = _JAVA_AWT_WM_NONREPARENTING,1
env = AWT_TOOLKIT,MToolkit


# ── Autostart ─────────────────────────────────────────────────────────────────

# snry-shell: bar + lock screen + idle + notifications + OSK + all overlays
exec-once = snry-shell

# Portals (needed for screen sharing, file pickers, etc.)
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Authentication agent
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Clipboard history (requires cliphist + wl-clipboard)
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Cursor
exec-once = hyprctl setcursor Bibata-Modern-Classic 24

# Optional: pipewire / wireplumber (usually started by systemd already)
# exec-once = pipewire
# exec-once = wireplumber


# ── Monitor ───────────────────────────────────────────────────────────────────
# Default: preferred resolution, auto position, scale 1.
# See https://wiki.hyprland.org/Configuring/Monitors/ for details.

monitor = , preferred, auto, 1


# ── Variables / app launchers ─────────────────────────────────────────────────

$terminal    = kitty
$fileManager = dolphin
$browser     = firefox
$textEditor  = kate


# ── Input ─────────────────────────────────────────────────────────────────────

input {
    kb_layout        = us
    numlock_by_default = true
    repeat_delay     = 250
    repeat_rate      = 35

    follow_mouse     = 1
    off_window_axis_events = 2

    touchpad {
        natural_scroll      = yes
        disable_while_typing = true
        clickfinger_behavior = true
        scroll_factor        = 0.7
    }
}

gestures {
    workspace_swipe                  = true
    workspace_swipe_distance         = 700
    workspace_swipe_cancel_ratio     = 0.2
    workspace_swipe_min_speed_to_force = 5
    workspace_swipe_direction_lock   = true
    workspace_swipe_direction_lock_threshold = 10
    workspace_swipe_create_new       = true
}


# ── General ───────────────────────────────────────────────────────────────────

general {
    gaps_in   = 4
    gaps_out  = 5
    gaps_workspaces = 50

    border_size = 1
    col.active_border   = rgba(0DB7D455)
    col.inactive_border = rgba(31313600)
    resize_on_border    = true

    no_focus_fallback = true
    allow_tearing     = true  # lets the `immediate` window rule work

    snap {
        enabled    = true
        window_gap = 4
        monitor_gap = 5
        respect_gaps = true
    }
}

dwindle {
    preserve_split  = true
    smart_split     = false
    smart_resizing  = false
}


# ── Decoration ────────────────────────────────────────────────────────────────
# Note: snry-shell forces decoration:rounding = 12 at runtime for its own
# surfaces. Setting it here applies the same rounding to all other windows.

decoration {
    rounding       = 12
    rounding_power = 2

    blur {
        enabled          = true
        xray             = true
        special          = false
        new_optimizations = true
        size             = 10
        passes           = 3
        brightness       = 1
        noise            = 0.05
        contrast         = 0.89
        vibrancy         = 0.5
        vibrancy_darkness = 0.5
        popups           = false
        popups_ignorealpha = 0.6
    }

    shadow {
        enabled      = true
        ignore_window = true
        range        = 50
        offset       = 0 4
        render_power = 10
        color        = rgba(00000027)
    }

    dim_inactive = true
    dim_strength = 0.05
    dim_special  = 0.2
}


# ── Animations ────────────────────────────────────────────────────────────────

animations {
    enabled = true

    bezier = expressiveFastSpatial,    0.42, 1.67, 0.21, 0.90
    bezier = expressiveDefaultSpatial, 0.38, 1.21, 0.22, 1.00
    bezier = emphasizedDecel,          0.05, 0.7,  0.1,  1
    bezier = emphasizedAccel,          0.3,  0,    0.8,  0.15
    bezier = standardDecel,            0,    0,    0,    1
    bezier = menu_decel,               0.1,  1,    0,    1
    bezier = menu_accel,               0.52, 0.03, 0.72, 0.08
    bezier = stall,                    1,   -0.1,  0.7,  0.85

    animation = windowsIn,   1, 3,   emphasizedDecel, popin 80%
    animation = windowsOut,  1, 2,   emphasizedDecel, popin 90%
    animation = windowsMove, 1, 3,   emphasizedDecel, slide
    animation = fadeIn,      1, 3,   emphasizedDecel
    animation = fadeOut,     1, 2,   emphasizedDecel
    animation = border,      1, 10,  emphasizedDecel

    animation = layersIn,      1, 2.7, emphasizedDecel, popin 93%
    animation = layersOut,     1, 2.4, menu_accel,      popin 94%
    animation = fadeLayersIn,  1, 0.5, menu_decel
    animation = fadeLayersOut, 1, 2.7, stall

    animation = workspaces,          1, 7,   menu_decel,      slide
    animation = specialWorkspaceIn,  1, 2.8, emphasizedDecel, slidevert
    animation = specialWorkspaceOut, 1, 1.2, emphasizedAccel, slidevert
}


# ── Misc ──────────────────────────────────────────────────────────────────────

misc {
    disable_hyprland_logo   = true
    disable_splash_rendering = true
    vfr                     = 1
    vrr                     = 0
    mouse_move_enables_dpms = true
    key_press_enables_dpms  = true
    animate_manual_resizes  = false
    animate_mouse_windowdragging = false
    enable_swallow          = false
    allow_session_lock_restore = true
    focus_on_activate       = true
    initial_workspace_tracking = false
}

binds {
    scroll_event_delay          = 0
    hide_special_on_workspace_change = true
}

cursor {
    zoom_factor    = 1
    zoom_rigid     = false
    zoom_disable_aa = true
    hotspot_padding = 1
}

xwayland {
    force_zero_scaling = true
}


# ── Keybinds ──────────────────────────────────────────────────────────────────
# Flags used below:
#   bind  = standard
#   bindl = works even on lock screen
#   binde = repeat while held
#   bindle = repeat + works on lock screen

##── Shell ────────────────────────────────────────────────────────────────────

# Overview / workspace switcher
bind  = Super, Tab,    exec, snry-shell --toggle-overview

# Popups
bind  = Super, N,      exec, snry-shell --toggle-notif-center
bind  = Super, W,      exec, snry-shell --toggle-wifi
bind  = Super, B,      exec, snry-shell --toggle-bluetooth
bind  = Super, Slash,  exec, snry-shell --toggle-cheatsheet
bind  = Super, I,      exec, snry-shell --toggle-settings

# App drawer
bind  = Super, A,      exec, snry-shell --toggle-appdrawer

# Scratchpad-style
bind  = Super, V,      exec, snry-shell --toggle-clipboard
bind  = Super, Period, exec, snry-shell --toggle-emoji
bind  = Super, M,      exec, snry-shell --toggle-media-overlay
bind  = Super, K,      exec, snry-shell --toggle-osk
bind  = Super, Z,      exec, snry-shell --toggle-notes

# Session / power
bind  = Ctrl+Alt, Delete, exec, snry-shell --toggle-session

# Screen recorder
bindl = Super+Shift, R, exec, snry-shell --toggle-recorder

# Region selector (screenshot helper)
bind  = Super+Shift, S, exec, snry-shell --toggle-region-selector

##── Session ──────────────────────────────────────────────────────────────────

# Lock screen (snry-shell built-in — no loginctl needed)
bindl = Super,       L,      exec, snry-shell --toggle-lock
bindl = Super+Shift, L,      exec, snry-shell --toggle-power-action

##── Volume ───────────────────────────────────────────────────────────────────

bindle = , XF86AudioRaiseVolume, exec, snry-shell --volume-up
bindle = , XF86AudioLowerVolume, exec, snry-shell --volume-down
bindl  = , XF86AudioMute,        exec, snry-shell --volume-mute
bindl  = , XF86AudioMicMute,     exec, snry-shell --mic-mute
bindl  = Alt, XF86AudioMute,     exec, snry-shell --mic-mute

##── Brightness ───────────────────────────────────────────────────────────────

bindle = , XF86MonBrightnessUp,   exec, snry-shell --brightness-up
bindle = , XF86MonBrightnessDown, exec, snry-shell --brightness-down

##── Media ────────────────────────────────────────────────────────────────────

bindl = , XF86AudioPlay,  exec, snry-shell --media-play-pause
bindl = , XF86AudioPause, exec, snry-shell --media-play-pause
bindl = , XF86AudioNext,  exec, snry-shell --media-next
bindl = , XF86AudioPrev,  exec, snry-shell --media-prev
bindl = Super+Shift, P,   exec, snry-shell --media-play-pause
bindl = Super+Shift, N,   exec, snry-shell --media-next
bindl = Super+Shift, B,   exec, snry-shell --media-prev

##── Screenshot ───────────────────────────────────────────────────────────────

# Full monitor → clipboard
bindl = , Print, exec, grim -o "$(hyprctl activeworkspace -j | jq -r '.monitor')" - | wl-copy

# Region → clipboard (requires slurp + grim)
bind  = Super+Shift, S, exec, grim -g "$(slurp)" - | wl-copy

# Color picker
bind  = Super+Shift, C, exec, hyprpicker -a

##── Apps ─────────────────────────────────────────────────────────────────────

bind = Super, Return,    exec, $terminal
bind = Super, T,         exec, $terminal
bind = Ctrl+Alt, T,      exec, $terminal
bind = Super, E,         exec, $fileManager
bind = Super, C,         exec, $textEditor
bind = Ctrl+Shift, Escape, exec, $taskManager

##── Window management ────────────────────────────────────────────────────────

# Focus
bind = Super, Left,  movefocus, l
bind = Super, Right, movefocus, r
bind = Super, Up,    movefocus, u
bind = Super, Down,  movefocus, d

# Move
bind = Super+Shift, Left,  movewindow, l
bind = Super+Shift, Right, movewindow, r
bind = Super+Shift, Up,    movewindow, u
bind = Super+Shift, Down,  movewindow, d

# Mouse
bindm = Super, mouse:272, movewindow
bindm = Super, mouse:273, resizewindow

# Close
bind = Super, Q,   killactive
bind = Alt,   F4,  killactive

# Float / fullscreen
bind = Super+Alt, Space, togglefloating
bind = Super, D,         fullscreen, 1
bind = Super, F,         fullscreen, 0
bind = Super, P,         pin

# Split ratio
binde = Super, Semicolon,  layoutmsg, splitratio -0.1
binde = Super, Apostrophe, layoutmsg, splitratio +0.1

# Scratchpad
bind = Super, S,         togglespecialworkspace
bind = Super+Alt, S,     movetoworkspacesilent, special

##── Workspaces ───────────────────────────────────────────────────────────────

# Switch (keycodes used so non-QWERTY layouts work)
bind = Super, code:10, workspace, 1
bind = Super, code:11, workspace, 2
bind = Super, code:12, workspace, 3
bind = Super, code:13, workspace, 4
bind = Super, code:14, workspace, 5
bind = Super, code:15, workspace, 6
bind = Super, code:16, workspace, 7
bind = Super, code:17, workspace, 8
bind = Super, code:18, workspace, 9
bind = Super, code:19, workspace, 10

# Move window to workspace
bind = Super+Alt, code:10, movetoworkspacesilent, 1
bind = Super+Alt, code:11, movetoworkspacesilent, 2
bind = Super+Alt, code:12, movetoworkspacesilent, 3
bind = Super+Alt, code:13, movetoworkspacesilent, 4
bind = Super+Alt, code:14, movetoworkspacesilent, 5
bind = Super+Alt, code:15, movetoworkspacesilent, 6
bind = Super+Alt, code:16, movetoworkspacesilent, 7
bind = Super+Alt, code:17, movetoworkspacesilent, 8
bind = Super+Alt, code:18, movetoworkspacesilent, 9
bind = Super+Alt, code:19, movetoworkspacesilent, 10

# Scroll through workspaces
bind = Super,       mouse_up,   workspace, +1
bind = Super,       mouse_down, workspace, -1
bind = Ctrl+Super,  Right,      workspace, r+1
bind = Ctrl+Super,  Left,       workspace, r-1
bind = Super,       Page_Down,  workspace, +1
bind = Super,       Page_Up,    workspace, -1

# Move window left/right
bind = Super+Shift, mouse_up,   movetoworkspace, r-1
bind = Super+Shift, mouse_down, movetoworkspace, r+1
bind = Super+Shift, Page_Down,  movetoworkspace, r+1
bind = Super+Shift, Page_Up,    movetoworkspace, r-1


# ── Window rules ──────────────────────────────────────────────────────────────

# Common floating dialogs
windowrulev2 = float,        title:^(Open File)(.*)$
windowrulev2 = center,       title:^(Open File)(.*)$
windowrulev2 = float,        title:^(Select a File)(.*)$
windowrulev2 = center,       title:^(Select a File)(.*)$
windowrulev2 = float,        title:^(Save As)(.*)$
windowrulev2 = center,       title:^(Save As)(.*)$
windowrulev2 = float,        title:^(File Upload)(.*)$
windowrulev2 = center,       title:^(File Upload)(.*)$
windowrulev2 = float,        title:^(Library)(.*)$
windowrulev2 = center,       title:^(Library)(.*)$

# Volume / network / bluetooth settings
windowrulev2 = float,        class:^(pavucontrol)$
windowrulev2 = size 45% 45%, class:^(pavucontrol)$
windowrulev2 = center,       class:^(pavucontrol)$
windowrulev2 = float,        class:^(nm-connection-editor)$
windowrulev2 = size 45% 45%, class:^(nm-connection-editor)$
windowrulev2 = center,       class:^(nm-connection-editor)$
windowrulev2 = float,        class:^(blueberry.py)$

# XWayland context menus — disable blur to avoid glitches
windowrulev2 = noblur, class:^()$, title:^()$

# Allow tearing for games / fullscreen apps that opt in
windowrulev2 = immediate, class:^(steam_app_.*)$


# ── User overrides ────────────────────────────────────────────────────────────
# These files are sourced last so they can override anything above.
# Copy them from your existing ~/.config/hypr/custom/ directory.
# Any bind/unbind/exec/windowrule added here takes effect on top of the defaults.

source = custom/env.conf
source = custom/execs.conf
source = custom/general.conf
source = custom/rules.conf
source = custom/keybinds.conf


# ── Monitor & workspace layout ────────────────────────────────────────────────
# Generated by nwg-displays (or set manually). Sourced last so monitor-specific
# workspace assignments reflect any custom monitor overrides above.

source = monitors.conf
source = workspaces.conf

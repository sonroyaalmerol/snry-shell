version: 2

project_name: snry-shell

before:
  hooks:
    - go mod tidy

builds:
  - id: snry-shell
    binary: snry-shell
    main: ./cmd/snry-shell
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - id: tarball
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}aarch64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md
      - CONTRIBUTING.md

nfpms:
  - id: deb
    package_name: snry-shell
    file_name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}aarch64
      {{- else }}{{ .Arch }}{{ end }}
    formats:
      - deb
    maintainer: Son Roy Almerol <github@snry.me>
    description: Modern Wayland desktop shell for Hyprland
    homepage: https://github.com/sonroyaalmerol/snry-shell
    license: MIT
    section: x11
    priority: optional
    dependencies:
      - gtk4
      - libgtk-4-layer-shell-0
      - hyprland
    recommends:
      - swww
      - matugen
      - wtype
      - wireplumber

  - id: rpm
    package_name: snry-shell
    file_name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}aarch64
      {{- else }}{{ .Arch }}{{ end }}
    formats:
      - rpm
    maintainer: Son Roy Almerol <github@snry.me>
    description: Modern Wayland desktop shell for Hyprland
    homepage: https://github.com/sonroyaalmerol/snry-shell
    license: MIT
    section: User Interface/Desktops
    dependencies:
      - gtk4
      - gtk4-layer-shell
      - hyprland

  - id: apk
    package_name: snry-shell
    file_name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}aarch64
      {{- else }}{{ .Arch }}{{ end }}
    formats:
      - apk
    maintainer: Son Roy Almerol <github@snry.me>
    description: Modern Wayland desktop shell for Hyprland
    homepage: https://github.com/sonroyaalmerol/snry-shell
    license: MIT

aurs:
  - homepage: https://github.com/sonroyaalmerol/snry-shell
    description: Modern Wayland desktop shell for Hyprland
    maintainers:
      - Son Roy Almerol <github@snry.me>
    license: MIT
    depends:
      - gtk4
      - gtk4-layer-shell
      - hyprland

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^ci:"
      - "^chore:"
      - "^style:"
      - "merge conflict"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: sonroyaalmerol
    name: snry-shell
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
